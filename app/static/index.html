<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-Asset Market Board</title>
    <link rel="preload" href="/static/fonts/ibm-plex-mono-latin-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/fonts/ibm-plex-mono-latin-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/fonts/ibm-plex-sans-latin-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/static/fonts.css?v=20260722-3" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=20260710-1" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=20260710-1" />
    <script>
      try {
        if (localStorage.getItem("board-theme") === "light") {
          document.documentElement.dataset.theme = "light";
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=20260722-8" />
  </head>
  <body>
    <aside id="news-panel" class="news-panel" aria-label="Live Telegram news" aria-hidden="true" inert>
      <div class="news-header">
        <span class="news-title">Live News</span>
        <span id="news-status" class="news-status"></span>
        <button id="news-close" class="icon-button" type="button" aria-label="Close news panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="news-channels" class="news-channels" role="group" aria-label="News channel filters"></div>
      <div id="news-list" class="news-list">
        <div class="empty-state">Loading feed</div>
      </div>
    </aside>

    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">MB</div>
        <div class="brand-copy">
          <h1>Cross-Asset Market Board</h1>
          <p id="board-meta">Session initializing</p>
        </div>
      </div>

      <nav class="view-tabs" role="tablist" aria-label="Board view">
        <button
          id="daily-tab"
          class="active"
          type="button"
          role="tab"
          data-view="daily"
          aria-controls="daily-view"
          aria-selected="true"
        >Daily</button>
        <button
          id="markets-tab"
          type="button"
          role="tab"
          data-view="markets"
          aria-controls="markets-view"
          aria-selected="false"
          tabindex="-1"
        >Markets</button>
      </nav>

      <div class="topbar-actions">
        <div class="live-badge">
          <span id="connection-state" class="state-dot"></span>
          <span id="feed-mode">Connecting</span>
          <span id="live-freshness" class="live-freshness">Updated --</span>
        </div>
        <button
          id="theme-toggle"
          class="icon-button"
          type="button"
          aria-label="Switch to light theme"
          aria-pressed="false"
          title="Switch to light theme"
        >
          <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"/></svg>
          <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
        <button
          id="news-toggle"
          class="icon-button"
          type="button"
          aria-label="Toggle live news panel"
          aria-pressed="false"
          title="Live Telegram news"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
        </button>
        <button
          id="reports-open"
          class="icon-button"
          type="button"
          aria-label="Open agent reports"
          title="Agent reports"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
          <span id="reports-badge" class="badge-dot" hidden></span>
        </button>
        <button id="refresh-button" class="toolbar-button" type="button" aria-label="Refresh market data" title="Refresh market data">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg><span>Refresh</span>
        </button>
        <button id="editor-open" class="icon-button" type="button" aria-label="Edit universe" title="Edit universe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </button>
      </div>
    </header>

    <div id="status-strip" class="status-strip connecting">
      <span class="status-pulse"></span>
      <span class="status-label">System</span>
      <span id="status-copy">Connecting to market data</span>
    </div>

    <div id="macro-strip" class="macro-strip" aria-label="Macro tape" hidden></div>

    <main class="workspace">
      <section id="daily-view" class="view-panel" role="tabpanel" aria-labelledby="daily-tab">
        <div id="daily-board" class="daily-board">
          <section class="analytics-panel loading-panel" aria-label="Loading market read">
            <header class="panel-heading">
              <span class="skeleton-line title"></span>
              <span class="skeleton-line short"></span>
            </header>
            <div class="regime-grid loading-regime">
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
            </div>
          </section>
          <div class="analytics-grid">
            <section class="analytics-panel loading-panel">
              <header class="panel-heading">
                <span class="skeleton-line title"></span>
                <span class="skeleton-line short"></span>
              </header>
              <div class="loading-blocks six">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </section>
            <section class="analytics-panel loading-panel">
              <header class="panel-heading">
                <span class="skeleton-line title"></span>
                <span class="skeleton-line short"></span>
              </header>
              <div class="loading-list">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </section>
          </div>
          <div class="analytics-grid equal">
            <section class="analytics-panel loading-panel">
              <header class="panel-heading"><span class="skeleton-line title"></span></header>
              <div class="loading-table"><span></span><span></span><span></span><span></span><span></span></div>
            </section>
            <section class="analytics-panel loading-panel">
              <header class="panel-heading"><span class="skeleton-line title"></span></header>
              <div class="loading-table"><span></span><span></span><span></span><span></span><span></span></div>
            </section>
          </div>
        </div>
      </section>

      <section id="markets-view" class="view-panel" role="tabpanel" aria-labelledby="markets-tab" hidden>
        <div class="market-tools">
          <div class="category-tabs" role="group" aria-label="Market category">
            <button type="button" data-category="tradfi" class="active" aria-pressed="true">TradFi</button>
            <button type="button" data-category="crypto" aria-pressed="false">Crypto</button>
            <button type="button" data-category="commodities" aria-pressed="false">Commodities</button>
          </div>
          <label class="market-search" title="Search symbols or sectors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              id="market-search"
              type="search"
              autocomplete="off"
              placeholder="Search symbol, sector, asset ( / )"
              aria-label="Search symbols, sectors, or assets"
            />
          </label>
          <button id="market-filter-clear" class="toolbar-button compact" type="button" hidden>Clear</button>
          <button
            id="market-layout-toggle"
            class="toolbar-button compact"
            type="button"
            aria-pressed="false"
            title="Flatten all groups into one sortable movers table"
          >Flat</button>
          <span id="market-filter-status" aria-live="polite">All markets</span>
        </div>
        <div id="board" class="board board-loading">
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span><span></span><span></span></div>
          </section>
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span><span></span></div>
          </section>
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span></div>
          </section>
        </div>
        <div id="crypto-tape" class="crypto-tape" hidden></div>
      </section>
    </main>

    <div id="editor-modal" class="modal" aria-hidden="true">
      <div class="editor-shell" role="dialog" aria-modal="true" aria-labelledby="editor-title">
        <div class="modal-header">
          <div>
            <h2 id="editor-title">Universe Editor</h2>
            <p id="editor-status" aria-live="polite"></p>
          </div>
          <button id="editor-close" class="icon-button" type="button" aria-label="Close editor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>

        <div class="editor-grid">
          <form id="group-form" class="editor-form">
            <label>
              Sector / Theme
              <input id="group-name" name="name" autocomplete="off" required />
            </label>
            <button type="submit">Add Group</button>
          </form>

          <form id="asset-form" class="editor-form asset-form">
            <label>
              Group
              <select id="asset-group" name="group" required></select>
            </label>
            <label>
              Symbol
              <input id="asset-symbol" name="symbol" autocomplete="off" required />
            </label>
            <label>
              Type
              <select id="asset-type" name="type">
                <option value="equity">Equity</option>
                <option value="etf">ETF</option>
                <option value="future">Future</option>
                <option value="crypto_perp">Crypto Perp</option>
              </select>
            </label>
            <label>
              Source
              <select id="asset-source" name="source">
                <option value="yahoo">Yahoo</option>
                <option value="lighter">Lighter</option>
                <option value="stooq">Stooq</option>
              </select>
            </label>
            <label>
              Exchange
              <input id="asset-exchange" name="exchange" autocomplete="off" />
            </label>
            <label>
              Name
              <input id="asset-name" name="displayName" autocomplete="off" />
            </label>
            <button type="submit">Add Asset</button>
          </form>

          <div id="editor-list" class="editor-list"></div>
        </div>
      </div>
    </div>

    <div id="reports-modal" class="modal" aria-hidden="true">
      <div class="reports-shell" role="dialog" aria-modal="true" aria-labelledby="reports-title">
        <div class="modal-header">
          <div>
            <h2 id="reports-title">Agent Reports</h2>
            <p id="reports-subtitle">Markdown reports pushed by Hermes cron jobs</p>
          </div>
          <div class="reports-header-actions">
            <button id="reports-back" class="toolbar-button" type="button" hidden>Back to list</button>
            <button id="reports-close" class="icon-button" type="button" aria-label="Close reports">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
          </div>
        </div>
        <div id="reports-list" class="reports-list">
          <div class="empty-state">Loading reports</div>
        </div>
        <article id="report-reader" class="report-reader" hidden></article>
      </div>
    </div>

    <div id="chart-modal" class="modal" aria-hidden="true">
      <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="chart-title">
        <div class="modal-header">
          <div>
            <h2 id="chart-title">Chart</h2>
            <p id="chart-subtitle"></p>
          </div>
          <button id="modal-close" class="icon-button" type="button" aria-label="Close chart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="intervals" role="group" aria-label="Chart timeframe">
          <span class="interval-group" aria-hidden="true">Intraday</span>
          <button type="button" data-interval="1m" data-range="1d" data-intraday>1m</button>
          <button type="button" data-interval="5m" data-range="1w" data-intraday>5m</button>
          <button type="button" data-interval="15m" data-range="1w" data-intraday>15m</button>
          <button type="button" data-interval="30m" data-range="1mo" data-intraday>30m</button>
          <button type="button" data-interval="1h" data-range="3mo" data-intraday>1h</button>
          <button type="button" data-interval="4h" data-range="6mo" data-intraday>4h</button>
          <span class="interval-group" aria-hidden="true">History</span>
          <button type="button" data-interval="1d" data-range="1y" class="active">1D</button>
          <button type="button" data-interval="1wk" data-range="5y">1W</button>
          <button type="button" data-interval="1mo" data-range="10y">1M</button>
        </div>
        <div id="chart-error" class="chart-error" hidden></div>
        <div id="chart" class="chart"></div>
        <section id="asset-profile" class="asset-profile" aria-live="polite">
          <div class="profile-empty">Select an asset to load profile data</div>
        </section>
      </div>
    </div>

    <div id="help-tooltip" class="help-tooltip" role="tooltip" hidden></div>

    <script src="/static/app.js?v=20260722-8" defer></script>
  </body>
</html>
